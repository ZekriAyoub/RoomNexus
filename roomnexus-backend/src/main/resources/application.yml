spring:
  application:
    name:
      roomnexus-backend
    schema:
      name: public

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    default-schema: ${spring.application.schema.name}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: ${spring.application.schema.name}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/roomnexus


server:
  port: ${APP_PORT}

logging:
  level:
    com:
      roomnexus: INFO
    org:
      springframework:
        security: WARN
      hibernate:
        SQL: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha