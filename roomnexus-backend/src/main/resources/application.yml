spring:
  application:
    name:
      roomnexus-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/roomnexus
    username: postgres
    password: secret@

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true


server:
  port:
    8080

logging:
  level:
    root: info


